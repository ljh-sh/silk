name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: silk
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: silk
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary: silk
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            binary: silk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: silk.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          strip staging/${{ matrix.binary }} || true
          tar -C staging -czf silk-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          rm -rf staging

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          (cd staging && zip ../silk-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.binary }})
          rm -rf staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silk-${{ matrix.target }}
          path: silk-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum silk-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/silk-*
            artifacts/SHA256SUMS
